      - Core PCE inflation was below 2%.

  - suite: full
    case_id: fed-four-financial-stability-vulnerabilities
    doc_pdf: tests/pdfs/2023-annual-report-truncated.pdf
    doc_index_json: tests/results/2023-annual-report-truncated_structure.json
    question: What four vulnerabilities does the Federal Reserve say it monitors for financial stability?
    reference_answer: "The Federal Reserve says it monitors four key vulnerabilities: asset valuations, borrowing by businesses and households, leverage in the financial sector, and funding risk."
    required_facts:
      - Asset valuations are one of the four vulnerabilities.
      - Borrowing by businesses and households is one of the four vulnerabilities.
      - Leverage in the financial sector is one of the four vulnerabilities.
      - Funding risk is one of the four vulnerabilities.
    forbidden_claims:
      - Cybersecurity is listed as one of the four vulnerabilities.
      - Inflation itself is listed as one of the four vulnerabilities.
